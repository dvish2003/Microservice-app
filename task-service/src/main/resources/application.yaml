server:
  port: 8082

spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: taskdb
  application:
    name: TASK-SERVICE


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

user-service:
  url: http://USER-SERVICE/users